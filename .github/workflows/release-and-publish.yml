name: Release Portable PostgreSQL

on:
  push:
    branches:
      - main
    paths:
      - ci/postgresql-release-config.json
      - scripts/ci/**
      - .github/workflows/release-and-publish.yml
  workflow_dispatch:
    inputs:
      majors:
        description: "Comma-separated PostgreSQL majors to release (default: all tracked)"
        required: false
        default: ""
      publish:
        description: "Publish GitHub releases after a successful build"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  packages: read

concurrency:
  group: release-portable-postgresql-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      majors: ${{ steps.resolve.outputs.majors }}
      should_publish: ${{ steps.resolve.outputs.should_publish }}
      container_image: ${{ steps.resolve.outputs.container_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build majors
        id: resolve
        env:
          MAJORS_INPUT: ${{ github.event.inputs.majors }}
          PUBLISH_INPUT: ${{ github.event.inputs.publish }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          majors_input="${MAJORS_INPUT}"

          if [[ -n "${majors_input}" ]]; then
            majors_json="$(
              printf '%s' "$majors_input" \
                | tr ',' '\n' \
                | sed 's/[[:space:]]//g' \
                | sed '/^$/d' \
                | jq -R . \
                | jq -cs .
            )"
          else
            majors_json="$(jq -c '.postgresql.tracked_majors' ci/postgresql-release-config.json)"
          fi

          should_publish='true'
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            should_publish="${PUBLISH_INPUT}"
          fi

          echo "majors=${majors_json}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
          echo "container_image=ghcr.io/${REPO,,}/build-manylinux2014:latest" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: plan
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        major: ${{ fromJson(needs.plan.outputs.majors) }}
    steps:
      - name: Compute cache week key
        id: week
        run: echo "key=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull build container
        run: docker pull "${{ needs.plan.outputs.container_image }}"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache-linux
          key: ccache-linux-pg${{ matrix.major }}-${{ steps.week.outputs.key }}
          restore-keys: |
            ccache-linux-pg${{ matrix.major }}-

      - name: Build portable PostgreSQL archive set
        run: |
          set -euo pipefail
          mkdir -p /tmp/ccache-linux
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -v "/tmp/ccache-linux:/ccache" \
            -w "${{ github.workspace }}" \
            -e CCACHE_DIR=/ccache \
            -e CC="ccache gcc" \
            -e CXX="ccache g++" \
            "${{ needs.plan.outputs.container_image }}" \
            bash -c "
              set -euo pipefail
              ccache --max-size=500M
              ccache --zero-stats
              chmod +x scripts/ci/*.sh scripts/*.sh
              scripts/ci/build_portable_postgresql.sh \
                --config ci/postgresql-release-config.json \
                --major '${{ matrix.major }}' \
                --target unknown-linux_x86_64 \
                --output-dir dist
              echo '--- ccache stats ---'
              ccache --show-stats
            "

      - name: Fix output permissions
        run: |
          if [[ -d dist ]]; then
            sudo chown -R "$(id -u):$(id -g)" dist/
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-portable-pg${{ matrix.major }}-unknown-linux_x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/release-${{ matrix.major }}-unknown-linux_x86_64.env

  build-windows:
    needs: plan
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        major: ${{ fromJson(needs.plan.outputs.majors) }}
    steps:
      - name: Compute cache week key
        id: week
        shell: bash
        run: echo "key=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            autoconf
            automake
            bison
            diffutils
            flex
            git
            make
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-jq
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-openldap
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-zlib
            perl
            tar
            unzip
            zip

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: C:\msys64\tmp\ccache
          key: ccache-windows-pg${{ matrix.major }}-${{ steps.week.outputs.key }}
          restore-keys: |
            ccache-windows-pg${{ matrix.major }}-

      - name: Configure ccache
        shell: msys2 {0}
        run: |
          export CCACHE_DIR=/tmp/ccache
          mkdir -p "$CCACHE_DIR"
          ccache --max-size=500M
          ccache --zero-stats

      - name: Build portable PostgreSQL archive set
        shell: msys2 {0}
        env:
          CCACHE_DIR: /tmp/ccache
          CC: ccache gcc
          CXX: ccache g++
        run: |
          set -euo pipefail
          chmod +x scripts/ci/*.sh scripts/*.sh
          scripts/ci/build_portable_postgresql.sh \
            --config ci/postgresql-release-config.json \
            --major "${{ matrix.major }}" \
            --target windows_x86_64 \
            --output-dir dist

      - name: Show ccache stats
        if: always()
        shell: msys2 {0}
        run: |
          export CCACHE_DIR=/tmp/ccache
          ccache --show-stats

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-portable-pg${{ matrix.major }}-windows_x86_64
          path: |
            dist/*.zip
            dist/*.sha256
            dist/release-${{ matrix.major }}-windows_x86_64.env

  publish:
    if: needs.plan.outputs.should_publish == 'true'
    needs:
      - plan
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        major: ${{ fromJson(needs.plan.outputs.majors) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download major artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: postgresql-portable-pg${{ matrix.major }}-*
          merge-multiple: true
          path: dist

      - name: Load release variables
        id: vars
        run: |
          set -euo pipefail
          source <(scripts/ci/get_release_vars.sh --config ci/postgresql-release-config.json --major "${{ matrix.major }}")
          echo "pg_major=${PG_MAJOR}" >> "$GITHUB_OUTPUT"
          echo "pg_version=${PG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.vars.outputs.release_title }}
          PG_VERSION: ${{ steps.vars.outputs.pg_version }}
        run: |
          set -euo pipefail
          release_tag="${RELEASE_TAG}"
          pg_version="${PG_VERSION}"
          notes_file="$(mktemp)"

          {
            printf 'Portable PostgreSQL %s\n\n' "$pg_version"
            printf 'Base package includes PostgreSQL core plus contrib.\n'
            printf 'This means pgcrypto, postgres_fdw, hstore, and the rest of contrib are already in the base archive.\n\n'
            printf 'Assets:\n'
            find dist -maxdepth 1 -type f \
              \( -name '*.tar.gz' -o -name '*.zip' \) \
              | sort \
              | sed 's#^#- #'
          } > "$notes_file"

          mapfile -t assets < <(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) | sort)

          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release upload "$release_tag" "${assets[@]}" --clobber
            gh release edit "$release_tag" --title "$RELEASE_TITLE" --notes-file "$notes_file"
          else
            gh release create "$release_tag" "${assets[@]}" --title "$RELEASE_TITLE" --notes-file "$notes_file"
          fi

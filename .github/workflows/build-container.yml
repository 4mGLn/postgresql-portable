name: Build Container Image

on:
  push:
    branches:
      - main
    paths:
      - ci/Dockerfile.manylinux2014
      - .github/workflows/build-container.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-manylinux2014:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ci
          file: ci/Dockerfile.manylinux2014
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/build-manylinux2014:latest
            ghcr.io/${{ github.repository }}/build-manylinux2014:${{ github.run_number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

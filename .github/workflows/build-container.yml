name: Build Container Image

on:
  push:
    branches:
      - main
    paths:
      - ci/Dockerfile.manylinux2014
      - .github/workflows/build-container.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-manylinux2014:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: meta
        env:
          REPO: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPO,,}/build-manylinux2014" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ci
          file: ci/Dockerfile.manylinux2014
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.run_number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

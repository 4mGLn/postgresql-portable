name: Validate Release Config

on:
  pull_request:
    paths:
      - ci/postgresql-release-config.json
      - scripts/ci/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          set -euo pipefail
          jq empty ci/postgresql-release-config.json
          echo "JSON syntax: OK"

      - name: Validate config structure
        run: |
          set -euo pipefail
          config="ci/postgresql-release-config.json"

          # Required top-level keys
          for key in postgresql portable separate_extensions; do
            if ! jq -e ".$key" "$config" >/dev/null 2>&1; then
              echo "FAIL: missing required key .$key" >&2
              exit 1
            fi
          done

          # Required postgresql fields
          for key in tracked_majors upstream_git_repo source_tarball_url_template releases; do
            if ! jq -e ".postgresql.$key" "$config" >/dev/null 2>&1; then
              echo "FAIL: missing .postgresql.$key" >&2
              exit 1
            fi
          done

          # Every tracked major must have a release entry with tag + version
          mapfile -t majors < <(jq -r '.postgresql.tracked_majors[]' "$config")
          for major in "${majors[@]}"; do
            tag="$(jq -r --arg m "$major" '.postgresql.releases[$m].tag // empty' "$config")"
            ver="$(jq -r --arg m "$major" '.postgresql.releases[$m].version // empty' "$config")"
            if [[ -z "$tag" || -z "$ver" ]]; then
              echo "FAIL: major $major is tracked but missing .postgresql.releases.$major.tag or .version" >&2
              exit 1
            fi
          done

          # Every target must have archive_format and runner
          mapfile -t targets < <(jq -r '.portable.targets | keys[]' "$config")
          for t in "${targets[@]}"; do
            fmt="$(jq -r --arg t "$t" '.portable.targets[$t].archive_format // empty' "$config")"
            runner="$(jq -r --arg t "$t" '.portable.targets[$t].runner // empty' "$config")"
            if [[ -z "$fmt" || -z "$runner" ]]; then
              echo "FAIL: target $t missing archive_format or runner" >&2
              exit 1
            fi
          done

          # Every separate extension must have a repo
          mapfile -t exts < <(jq -r '.separate_extensions | keys[]' "$config")
          for ext in "${exts[@]}"; do
            repo="$(jq -r --arg e "$ext" '.separate_extensions[$e].repo // empty' "$config")"
            if [[ -z "$repo" ]]; then
              echo "FAIL: extension $ext missing .repo" >&2
              exit 1
            fi
          done

          # Validate configure_flags_exclude: keys must be known targets,
          # values must be flags that exist in configure_flags.
          mapfile -t base_flags < <(jq -r '.portable.configure_flags[]?' "$config")
          mapfile -t exclude_targets < <(jq -r '.portable.configure_flags_exclude // {} | keys[]' "$config")
          for t in "${exclude_targets[@]}"; do
            if ! jq -e --arg t "$t" '.portable.targets[$t]' "$config" >/dev/null 2>&1; then
              echo "FAIL: configure_flags_exclude has unknown target '$t'" >&2
              exit 1
            fi
            mapfile -t excl_flags < <(jq -r --arg t "$t" \
              '.portable.configure_flags_exclude[$t][]?' "$config")
            for excl in "${excl_flags[@]}"; do
              found=0
              for base in "${base_flags[@]}"; do
                [[ "$base" == "$excl" ]] && found=1 && break
              done
              if (( !found )); then
                echo "FAIL: configure_flags_exclude[$t] contains '$excl' which is not in configure_flags" >&2
                exit 1
              fi
            done
          done

          echo "Config structure: OK"
          echo "  Tracked majors: ${majors[*]}"
          echo "  Targets: ${targets[*]}"
          echo "  Extensions: ${exts[*]}"
          if [[ ${#exclude_targets[@]} -gt 0 ]]; then
            echo "  configure_flags_exclude targets: ${exclude_targets[*]}"
          fi
